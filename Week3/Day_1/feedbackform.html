<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Feedback Form</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            width: 400px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }

        .error {
            background: #ffdddd;
            color: #d8000c;
        }

        .success {
            background: #ddffdd;
            color: #4f8a10;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Feedback</h2>

    <form id="feedbackForm">
        <input type="text" id="name" placeholder="Enter your Name">
        <input type="email" id="email" placeholder="Enter your Email">

        <select id="rating">
            <option value="">Select Course Rating</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Average">Average</option>
            <option value="Poor">Poor</option>
        </select>

        <textarea id="comments" rows="4" placeholder="Enter your Comments"></textarea>

        <button type="submit">Submit Feedback</button>
    </form>

    <div id="responseMessage" class="message"></div>
</div>

<script>
    $(document).ready(function(){

        $("#feedbackForm").submit(function(event){
            event.preventDefault(); // Prevent page reload

            let name = $("#name").val().trim();
            let email = $("#email").val().trim();

            // Validation
            if(name === "" || email === "") {
                $("#responseMessage")
                    .removeClass("success")
                    .addClass("error")
                    .html("Please enter both Name and Email.")
                    .fadeIn();
            } else {
                $("#responseMessage")
                    .removeClass("error")
                    .addClass("success")
                    .html("Thank you! Your feedback has been submitted successfully.")
                    .fadeIn();

                // Clear form fields
                $("#feedbackForm")[0].reset();
            }
        });

    });
</script>

</body>
</html>
