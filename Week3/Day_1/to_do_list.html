<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery To-Do List</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .todo-container {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .add-btn {
            background: #007bff;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 8px;
            background: #f1f1f1;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .delete-btn {
            background: red;
            color: white;
            padding: 4px 8px;
        }

        .stats {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="todo-container">
    <h2>To-Do List</h2>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter a new task">
        <button class="add-btn" id="addTask">Add</button>
    </div>

    <ul id="taskList"></ul>

    <div class="stats">
        Total Tasks: <span id="totalCount">0</span> |
        Completed: <span id="completedCount">0</span>
    </div>
</div>

<script>
    $(document).ready(function(){

        function updateCounts() {
            let total = $("#taskList li").length;
            let completed = $("#taskList li.completed").length;

            $("#totalCount").text(total);
            $("#completedCount").text(completed);
        }

        // Add Task
        $("#addTask").click(function(){

            let taskText = $("#taskInput").val().trim();

            if(taskText !== "") {

                $("#taskList").append(
                    "<li>" +
                        "<span class='task-text'>" + taskText + "</span>" +
                        "<button class='delete-btn'>X</button>" +
                    "</li>"
                );

                $("#taskInput").val("");
                updateCounts();
            }
        });

        // Event Delegation for Complete Task
        $("#taskList").on("click", ".task-text", function(){
            $(this).parent().toggleClass("completed");
            updateCounts();
        });

        // Event Delegation for Delete Task
        $("#taskList").on("click", ".delete-btn", function(){
            $(this).parent().remove();
            updateCounts();
        });

    });
</script>

</body>
</html>
