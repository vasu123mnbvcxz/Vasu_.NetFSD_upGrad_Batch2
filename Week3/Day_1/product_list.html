<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-commerce Cart</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        /* Header */
        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: right;
            font-size: 18px;
        }

        .cart-count {
            font-weight: bold;
        }

        /* Product Section */
        .container {
            width: 80%;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product h3 {
            margin-bottom: 10px;
        }

        button {
            padding: 8px 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        .message {
            margin-top: 8px;
            font-size: 14px;
            color: #28a745;
        }
    </style>
</head>

<body>

<div class="header">
    🛒 Cart Items: <span id="cartCounter" class="cart-count">0</span>
</div>

<div class="container" id="productList">

    <div class="product" data-id="1">
        <h3>Product 1</h3>
        <p>Price: ₹500</p>
        <button class="addToCart">Add to Cart</button>
        <div class="message"></div>
    </div>

    <div class="product" data-id="2">
        <h3>Product 2</h3>
        <p>Price: ₹800</p>
        <button class="addToCart">Add to Cart</button>
        <div class="message"></div>
    </div>

    <div class="product" data-id="3">
        <h3>Product 3</h3>
        <p>Price: ₹1200</p>
        <button class="addToCart">Add to Cart</button>
        <div class="message"></div>
    </div>

    <div class="product" data-id="4">
        <h3>Product 4</h3>
        <p>Price: ₹1500</p>
        <button class="addToCart">Add to Cart</button>
        <div class="message"></div>
    </div>

</div>

<script>
    $(document).ready(function(){

        let cartCount = 0;

        // Event Delegation
        $("#productList").on("click", ".addToCart", function(){

            cartCount++;

            // Update cart counter using .text()
            $("#cartCounter").text(cartCount);

            // Disable button using .prop()
            $(this).prop("disabled", true);

            // Change button text using .text()
            $(this).text("Added");

            // Add custom attribute using .attr()
            $(this).attr("data-added", "true");

            // Show confirmation message
            $(this).siblings(".message")
                   .text("✔ Product added to cart!");
        });

    });
</script>

</body>
</html>
